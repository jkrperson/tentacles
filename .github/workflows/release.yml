name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer and main process
        run: bunx tsc && bunx vite build && bun run build:daemon

      - name: Write Apple API key (macOS only)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT_B64: ${{ secrets.APPLE_API_KEY_CONTENT_B64 }}
        run: |
          echo "$APPLE_API_KEY_CONTENT_B64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          # Sanity-check: PEM file must start with -----BEGIN PRIVATE KEY-----
          head -1 "$RUNNER_TEMP/AuthKey.p8"

      - name: Verify notarytool credentials (macOS only)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          xcrun notarytool history \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json | head -c 500

      - name: Package with electron-builder
        # macOS gets notarization override; other platforms use config defaults.
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            bunx electron-builder --publish never -c.mac.notarize=true
          else
            bunx electron-builder --publish never
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (no-op on non-mac runners)
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.AppImage
            release/**/Tentacles-Windows-Setup.exe
            release/**/latest-mac.yml
            release/**/latest-linux.yml
            release/**/latest.yml

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
